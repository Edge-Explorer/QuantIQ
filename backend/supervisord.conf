[supervisord]
nodaemon=true
user=root
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:redis]
command=redis-server --protected-mode no
autostart=true
autorestart=true
stdout_logfile=/var/log/redis.out.log
stderr_logfile=/var/log/redis.err.log

[program:redpanda]
command=/usr/bin/rpk redpanda start --mode dev-container --kafka-addr 0.0.0.0:9092 --advertise-kafka-addr 127.0.0.1:9092
autostart=true
autorestart=true
stdout_logfile=/var/log/redpanda.out.log
stderr_logfile=/var/log/redpanda.err.log

[program:fastapi]
command=/workspace/.venv/bin/uvicorn backend.app.main:app --host 0.0.0.0 --port 7860
directory=/workspace
autostart=true
autorestart=true
stdout_logfile=/var/log/fastapi.out.log
stderr_logfile=/var/log/fastapi.err.log

[program:celery]
command=/workspace/.venv/bin/celery -A backend.app.services.celery_app.celery_app worker --loglevel=info 
environment=C_FORCE_ROOT="true"
directory=/workspace
autostart=true
autorestart=true
stdout_logfile=/var/log/celery.out.log
stderr_logfile=/var/log/celery.err.log

[program:worker]
command=/workspace/.venv/bin/python worker/worker.py
directory=/workspace
autostart=true
autorestart=true
stdout_logfile=/var/log/worker.out.log
stderr_logfile=/var/log/worker.err.log